name: 月末勤怠データ自動送信

on:
  schedule:
    # 毎月28〜31日 11:00 UTC（= 20:00 JST）に実行
    # 月末日以外はジョブ内で自動スキップ
    - cron: '0 11 28-31 * *'
  workflow_dispatch:
    inputs:
      year:
        description: '対象年（例: 2026）'
        required: false
      month:
        description: '対象月（例: 4）'
        required: false

jobs:
  send-monthly:
    runs-on: ubuntu-latest
    steps:
      - name: 月末日チェック
        id: check
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # JST (UTC+9) での日付を使って判定
            today_day=$(TZ=Asia/Tokyo date +%d)
            today_month=$(TZ=Asia/Tokyo date +%m)
            # 当月の最終日を算出（date コマンドの「翌月0日」トリック）
            today_year=$(TZ=Asia/Tokyo date +%Y)
            last_day=$(date -d "${today_year}-${today_month}-01 +1 month -1 day" +%d 2>/dev/null \
              || python3 -c "import calendar; print(calendar.monthrange(${today_year}, ${today_month})[1])")
            if [ "$today_day" != "$last_day" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "今日は月末日ではないためスキップ (${today_month}/${today_day}、月末は${last_day}日)"
              exit 0
            fi
            echo "月末日を確認 (${today_month}/${today_day})"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: 勤怠データ送信
        if: steps.check.outputs.skip != 'true'
        env:
          KINTAI_API_URL: ${{ secrets.KINTAI_API_URL }}
          KINTAI_API_KEY: ${{ secrets.KINTAI_API_KEY }}
          INPUT_YEAR: ${{ github.event.inputs.year }}
          INPUT_MONTH: ${{ github.event.inputs.month }}
        run: |
          BODY='{}'
          if [ -n "${INPUT_YEAR}" ] && [ -n "${INPUT_MONTH}" ]; then
            # 数字のみであることを検証（インジェクション防止）
            if ! echo "${INPUT_YEAR}" | grep -qE '^[0-9]{4}$' || ! echo "${INPUT_MONTH}" | grep -qE '^[0-9]{1,2}$'; then
              echo "::error::year/month の入力値が不正です: year=${INPUT_YEAR}, month=${INPUT_MONTH}"
              exit 1
            fi
            BODY="{\"year\":${INPUT_YEAR},\"month\":${INPUT_MONTH}}"
          fi

          echo "送信先: ${KINTAI_API_URL}/api/send-monthly"
          echo "リクエストボディ: ${BODY}"

          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${KINTAI_API_KEY}" \
            -d "${BODY}" \
            "${KINTAI_API_URL}/api/send-monthly")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: ${http_code}"
          echo "Response: ${body}"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::送信に失敗しました (HTTP ${http_code}): ${body}"
            exit 1
          fi

          echo "送信完了"
