name = "kintai-app"
compatibility_date = "2024-09-23"

# Cloudflare Pages のビルド出力ディレクトリ（next build の静的エクスポート先）
pages_build_output_dir = "out"

[[kv_namespaces]]
binding = "KINTAI_DATA"
id = "c83ff556009a48a0aa5d291100f2cab2"
preview_id = "ca8e9297b16a41398e463043975fcb2d"

# ── セキュリティ設定 ──
# API_KEY: wrangler secret put API_KEY で設定してください
#   → ドクター用アプリが使用するAPIキー（NEXT_PUBLIC_API_KEY と対応）
# ADMIN_API_KEY: wrangler secret put ADMIN_API_KEY で設定してください
#   → 管理ダッシュボード（/admin/）専用のパスワード。ドクター用と別に設定してください。
#   例: wrangler secret put ADMIN_API_KEY
# ALLOWED_ORIGINS: Cloudflare Pages の Settings > Environment Variables で設定
#   例: "https://kintai-app.pages.dev,https://custom-domain.com"

# ── メール送信設定（SendGrid） ──
# SENDGRID_API_KEY: wrangler secret put SENDGRID_API_KEY で設定してください
#   SendGrid (https://sendgrid.com) で取得した API キー
# SENDER_EMAIL: SendGrid の Single Sender Verification で認証済みのメールアドレス
# NOTIFY_EMAIL: 勤怠データの送信先（山本さん）

# ── 本番環境変数 ──
# ALLOWED_ORIGINS は Cloudflare Pages Dashboard > Settings > Environment Variables で
# Production / Preview 別に設定してください。
#   Production: "https://kintai-app-dyu.pages.dev"
#   Preview:    "https://*.kintai-app-dyu.pages.dev,http://localhost:3000,http://localhost:3001"

[vars]
ALLOWED_ORIGINS = "https://kintai-app-dyu.pages.dev"
NOTIFY_EMAIL = "stardc666@gmail.com"
SENDER_EMAIL = "stardc.nishikita@gmail.com"
