<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スター歯科クリニック 勤怠管理アプリ Ver 4.0</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Encoding.js (Shift-JIS変換用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9', // Sky blue like
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-700 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // 日本の祝日データ（2025-2026対応）
        const JAPANESE_HOLIDAYS = {
            "2025-01-01": "元日", "2025-01-13": "成人の日", "2025-02-11": "建国記念の日", "2025-02-23": "天皇誕生日", "2025-02-24": "振替休日",
            "2025-03-20": "春分の日", "2025-04-29": "昭和の日", "2025-05-03": "憲法記念日", "2025-05-04": "みどりの日", "2025-05-05": "こどもの日", "2025-05-06": "振替休日",
            "2025-07-21": "海の日", "2025-08-11": "山の日", "2025-09-15": "敬老の日", "2025-09-23": "秋分の日", "2025-10-13": "スポーツの日", "2025-11-03": "文化の日", "2025-11-23": "勤労感謝の日", "2025-11-24": "振替休日",
            "2026-01-01": "元日", "2026-01-12": "成人の日", "2026-02-11": "建国記念の日", "2026-02-23": "天皇誕生日",
            "2026-03-20": "春分の日", "2026-04-29": "昭和の日", "2026-05-03": "憲法記念日", "2026-05-04": "みどりの日", "2026-05-05": "こどもの日", "2026-05-06": "振替休日",
            "2026-07-20": "海の日", "2026-08-11": "山の日", "2026-09-21": "敬老の日", "2026-09-23": "秋分の日", "2026-10-12": "スポーツの日", "2026-11-03": "文化の日", "2026-11-23": "勤労感謝の日", "2026-11-24": "振替休日"
        };

        const App = () => {
            // --- ステート管理 ---
            const [year, setYear] = useState(2026);
            const [month, setMonth] = useState(3);
            const [empId, setEmpId] = useState('1030');
            const [empName, setEmpName] = useState('生野智也');
            
            // 定休日管理（日曜は固定、もう一つを選択）
            const [weekdayHoliday, setWeekdayHoliday] = useState(4); // デフォルト木曜(4)

            // 設定：祝日週の振替出勤を行うか
            const [enableSubstituteWork, setEnableSubstituteWork] = useState(true);

            // 例外データ
            const [extraWorkDays, setExtraWorkDays] = useState([]); // 休日出勤
            
            // absentDaysをオブジェクト配列 {date: 'YYYY-MM-DD', type: '有給'|'欠勤'|'振替'|'祝日'}
            const [absentRecords, setAbsentRecords] = useState([]); 
            
            const [timeChanges, setTimeChanges] = useState([]);     // 時間変更

            // 一時入力用ステート
            const [tempExtraDate, setTempExtraDate] = useState('');
            const [tempAbsentDate, setTempAbsentDate] = useState('');
            const [tempAbsentType, setTempAbsentType] = useState('有給');

            const [tempChangeDate, setTempChangeDate] = useState('');
            const [tempInTime, setTempInTime] = useState('');
            const [tempOutTime, setTempOutTime] = useState('');

            // CSVデータとプレビュー用
            const [generatedCsv, setGeneratedCsv] = useState(null);
            const [previewData, setPreviewData] = useState([]);
            const [showPreview, setShowPreview] = useState(false);
            const [summary, setSummary] = useState({ 
                workDays: 0, 
                extraDays: 0, 
                absentTotal: 0,
                absentPaid: 0,
                absentUnpaid: 0,
                absentSub: 0
            });

            const [isInitialized, setIsInitialized] = useState(false);

            // ドクターリスト
            const doctorList = [
                { id: '1030', name: '生野' },
                { id: '1017', name: '露口' },
                { id: '1016', name: '松浦' },
                { id: '1059', name: '藤田' },
                { id: '1023', name: '加藤' },
                { id: '1033', name: '岸元' },
                { id: '1020', name: '安達' },
                { id: '1013', name: '松本' },
                { id: '1019', name: '久保' },
                { id: '1036', name: '落窪' },
                { id: '1063', name: '山本' },
                { id: '1040', name: '岡田' },
                { id: '1047', name: '珠央' },
            ];

            // 実際の休日配列を生成（0:日曜 + 選択した曜日）
            const holidays = useMemo(() => [0, weekdayHoliday].sort(), [weekdayHoliday]);

            // --- 設定読み込み ---
            useEffect(() => {
                const savedConfig = localStorage.getItem('star_dental_config_v4_0');
                if (savedConfig) {
                    try {
                        const parsed = JSON.parse(savedConfig);
                        setEmpId(parsed.empId || '1030');
                        setEmpName(parsed.empName || '生野智也');
                        
                        // 定休日の復元
                        if (parsed.weekdayHoliday !== undefined) {
                            setWeekdayHoliday(parsed.weekdayHoliday);
                        } else if (parsed.holidays) {
                            const wd = parsed.holidays.find(d => d !== 0);
                            setWeekdayHoliday(wd !== undefined ? wd : 4);
                        }
                        
                        if(parsed.year && parsed.month) {
                            setYear(parsed.year);
                            setMonth(parsed.month);
                        }
                    } catch (e) {
                        console.error("設定読み込みエラー", e);
                    }
                }
                setIsInitialized(true);
            }, []);

            // 設定保存
            useEffect(() => {
                if (!isInitialized) return;
                const config = { empId, empName, weekdayHoliday, holidays: [0, weekdayHoliday], year, month };
                localStorage.setItem('star_dental_config_v4_0', JSON.stringify(config));
            }, [empId, empName, weekdayHoliday, year, month, isInitialized]);

            // --- 自動データ生成ロジック (月変更 または 定休日変更時) ---
            useEffect(() => {
                if (!isInitialized) return;

                // 1. その月の祝日を特定
                const holidaysInMonth = [];
                const prefix = `${year}-${String(month).padStart(2, '0')}`;
                Object.keys(JAPANESE_HOLIDAYS).forEach(dateStr => {
                    if (dateStr.startsWith(prefix)) {
                        holidaysInMonth.push({
                            date: dateStr,
                            type: '祝日',
                            name: JAPANESE_HOLIDAYS[dateStr]
                        });
                    }
                });

                // 2. 振替出勤日を特定（選択された平日休みに対して判定）
                const substituteWorkDays = [];
                const endDate = new Date(year, month, 0);
                
                for (let d = 1; d <= endDate.getDate(); d++) {
                    const currentDate = new Date(year, month - 1, d);
                    const dayOfWeek = currentDate.getDay(); // 0-6
                    const dateDisplay = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

                    // 「選択された平日定休日」 かつ 「祝日ではない」 場合のみ振替候補
                    if (dayOfWeek === weekdayHoliday && !JAPANESE_HOLIDAYS[dateDisplay]) {
                        // その週（日〜土）の範囲を取得
                        const sun = new Date(currentDate);
                        sun.setDate(currentDate.getDate() - dayOfWeek); // 日(0)まで戻る
                        
                        let hasHolidayInWeek = false;
                        for(let i=0; i<7; i++){
                            const check = new Date(sun);
                            check.setDate(sun.getDate() + i);
                            const k = `${check.getFullYear()}-${String(check.getMonth()+1).padStart(2,'0')}-${String(check.getDate()).padStart(2,'0')}`;
                            if(JAPANESE_HOLIDAYS[k]) {
                                hasHolidayInWeek = true;
                                break;
                            }
                        }

                        if(hasHolidayInWeek && enableSubstituteWork) {
                            substituteWorkDays.push(dateDisplay);
                        }
                    }
                }

                setAbsentRecords(holidaysInMonth);
                setExtraWorkDays(substituteWorkDays);
                setTimeChanges([]);
                setPreviewData([]); 
                setShowPreview(false);

            }, [year, month, weekdayHoliday, enableSubstituteWork, isInitialized]);


            const selectDoctor = (doc) => {
                setEmpId(doc.id);
                setEmpName(doc.name);
            };

            const allHolidaysList = useMemo(() => {
                const list = [];
                const targetYearPrefix = `${year}-`;
                Object.keys(JAPANESE_HOLIDAYS).forEach(dateStr => {
                    if (dateStr.startsWith(targetYearPrefix)) {
                        list.push({ date: dateStr, name: JAPANESE_HOLIDAYS[dateStr] });
                    }
                });
                return list.sort((a,b) => a.date.localeCompare(b.date));
            }, [year]);

            const getWeekDay = (dateStr) => {
                const date = new Date(dateStr);
                return ['日','月','火','水','木','金','土'][date.getDay()];
            };

            // --- カレンダー操作 ---
            const toggleDateStatus = (dateStr) => {
                const date = new Date(dateStr);
                const dayOfWeek = date.getDay();
                
                const isExtra = extraWorkDays.includes(dateStr);
                const absentRec = absentRecords.find(r => r.date === dateStr);
                const isAbsent = !!absentRec;
                const isHoliday = holidays.includes(dayOfWeek);
                const isNationalHoliday = !!JAPANESE_HOLIDAYS[dateStr];

                const currentlyOff = isAbsent || (!isExtra && (isHoliday || isNationalHoliday));

                if (currentlyOff) {
                    if (isAbsent) {
                        setAbsentRecords(absentRecords.filter(r => r.date !== dateStr));
                    }
                    if (isHoliday || isNationalHoliday) {
                        if (!isExtra) {
                            setExtraWorkDays([...extraWorkDays, dateStr].sort());
                        }
                    }
                } else {
                    if (isExtra) {
                        setExtraWorkDays(extraWorkDays.filter(d => d !== dateStr));
                    } else {
                         setAbsentRecords([...absentRecords, { date: dateStr, type: '有給' }].sort((a,b) => a.date.localeCompare(b.date)));
                    }
                }
            };


            // --- CSV生成 & 集計ロジック ---
            const generateData = useCallback(() => {
                const previewRows = [];
                const endDate = new Date(year, month, 0); 
                
                // 【重要修正】テンプレート通りのヘッダー行を作成（Shift-JIS化するのでBOMは付けない）
                let csvContent = "";
                csvContent += "#従業員コード*,名前*(従業員コード、名前はどちらか必須),打刻種別コード*,打刻日時*\r\n";
                csvContent += "#（注）*は必須項目です。最大登録数は1回あたり1000件です。,,,\r\n";
                csvContent += "#先頭が#から始まる行は読み込まれません。最終行は改行で終了して下さい。また、下記サンプル行は削除してご使用下さい。,,,\r\n";
                csvContent += "#「打刻種別コード」出勤1、退勤2,,,\r\n";
                
                let countWork = 0;
                let countExtra = 0;
                let countAbsentPaid = 0;
                let countAbsentUnpaid = 0;
                let countAbsentSub = 0;

                for (let d = 1; d <= endDate.getDate(); d++) {
                    const currentDate = new Date(year, month - 1, d);
                    const dayOfWeek = currentDate.getDay();
                    
                    const y = currentDate.getFullYear();
                    const m = String(currentDate.getMonth() + 1).padStart(2, '0');
                    const dt = String(currentDate.getDate()).padStart(2, '0');
                    
                    const dateStr = `${y}${m}${dt}`; 
                    const dateDisplay = `${y}-${m}-${dt}`; 

                    let isHoliday = holidays.includes(dayOfWeek);
                    let status = "通常";
                    let isExtraWork = false;
                    let isSubstitute = false;

                    const absentRec = absentRecords.find(r => r.date === dateDisplay);
                    if (absentRec) {
                        isHoliday = true;
                        if (absentRec.type === '祝日') {
                            status = `祝日（${absentRec.name || JAPANESE_HOLIDAYS[dateDisplay] || ''}）`;
                        } else {
                            status = absentRec.type;
                            if (!holidays.includes(dayOfWeek)) {
                                if (absentRec.type === '有給') countAbsentPaid++;
                                else if (absentRec.type === '欠勤') countAbsentUnpaid++;
                                else if (absentRec.type === '振替休日') countAbsentSub++;
                            }
                        }
                    }

                    if (extraWorkDays.includes(dateDisplay)) {
                        isHoliday = false;
                        if (holidays.includes(dayOfWeek)) {
                            if (dayOfWeek === weekdayHoliday) { 
                                status = "祝日振替診療";
                                isSubstitute = true;
                            } else {
                                status = "休日出勤";
                                isExtraWork = true;
                            }
                        } else if (absentRec && absentRec.type === '祝日') {
                             status = "休日出勤";
                             isExtraWork = true;
                        }
                    }

                    if (!isHoliday) {
                        countWork++;
                        if (isExtraWork) countExtra++;

                        let start = "0900";
                        let end = "1930";
                        if (dayOfWeek === 3 || dayOfWeek === 6) {
                            end = "1730";
                        }

                        const changeRec = timeChanges.find(c => c.date === dateDisplay);
                        if (changeRec) {
                            start = changeRec.inTime.replace(':', '');
                            end = changeRec.outTime.replace(':', '');
                            status = (status === "通常" || status === "祝日振替診療") ? "時間変更" : status;
                        }

                        csvContent += `${empId},${empName},1,${dateStr}${start}\r\n`;
                        csvContent += `${empId},${empName},2,${dateStr}${end}\r\n`;

                        previewRows.push({
                            date: `${Number(m)}/${Number(dt)}`,
                            week: ['日','月','火','水','木','金','土'][dayOfWeek],
                            weekIdx: dayOfWeek,
                            type: status, 
                            in: `${start.slice(0,2)}:${start.slice(2)}`,
                            out: `${end.slice(0,2)}:${end.slice(2)}`,
                            isSubstitute: isSubstitute
                        });
                    }
                }

                setGeneratedCsv(csvContent);
                setPreviewData(previewRows);
                setSummary({
                    workDays: countWork,
                    extraDays: countExtra,
                    absentTotal: countAbsentPaid + countAbsentUnpaid + countAbsentSub,
                    absentPaid: countAbsentPaid,
                    absentUnpaid: countAbsentUnpaid,
                    absentSub: countAbsentSub
                });
                setShowPreview(true);
            }, [year, month, holidays, weekdayHoliday, extraWorkDays, absentRecords, timeChanges, empId, empName]);

            useEffect(() => {
                if (showPreview) {
                    generateData();
                }
            }, [generateData, showPreview]);


            // 【重要】Shift-JIS変換してダウンロード
            const downloadCsv = () => {
                if (!generatedCsv) return;
                
                // 文字列を文字コード配列に変換
                const unicodeList = [];
                for (let i = 0; i < generatedCsv.length; i++) {
                    unicodeList.push(generatedCsv.charCodeAt(i));
                }

                // Shift-JISに変換
                const sjisCodeList = Encoding.convert(unicodeList, {
                    to: 'SJIS',
                    from: 'UNICODE'
                });

                const blob = new Blob([new Uint8Array(sjisCodeList)], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${year}${String(month).padStart(2,'0')}_${empId}_${empName}.csv`;
                a.click();
            };

            // UI操作ハンドラ群
            const addExtraWork = () => {
                if(tempExtraDate && !extraWorkDays.includes(tempExtraDate)) {
                    setExtraWorkDays([...extraWorkDays, tempExtraDate].sort());
                    setTempExtraDate('');
                }
            };
            const removeExtraWork = (date) => {
                setExtraWorkDays(extraWorkDays.filter(d => d !== date));
            };
            const addAbsentRecord = () => {
                if(tempAbsentDate) {
                    const filtered = absentRecords.filter(r => r.date !== tempAbsentDate);
                    setAbsentRecords([...filtered, { date: tempAbsentDate, type: tempAbsentType }].sort((a,b) => a.date.localeCompare(b.date)));
                    setTempAbsentDate('');
                }
            };
            const removeAbsentRecord = (date) => {
                setAbsentRecords(absentRecords.filter(r => r.date !== date));
            };
            const addChange = () => {
                if(tempChangeDate && tempInTime && tempOutTime) {
                    const filtered = timeChanges.filter(c => c.date !== tempChangeDate);
                    setTimeChanges([...filtered, {
                        date: tempChangeDate,
                        inTime: tempInTime,
                        outTime: tempOutTime
                    }].sort((a,b) => a.date.localeCompare(b.date)));
                    setTempChangeDate('');
                    setTempInTime('');
                    setTempOutTime('');
                }
            };
            const removeChange = (date) => {
                setTimeChanges(timeChanges.filter(c => c.date !== date));
            };

            const toggleHoliday = (dayIdx) => {
                if(holidays.includes(dayIdx)){
                    setHolidays(holidays.filter(d => d !== dayIdx));
                } else {
                    setHolidays([...holidays, dayIdx].sort());
                }
            }

            const SectionHeader = ({ icon, title, step, colorClass }) => (
                <h2 className="text-lg font-bold mb-4 pb-2 text-slate-700 flex items-center border-b border-slate-200">
                    <span className={`${colorClass} text-white text-xs font-bold mr-3 px-2 py-1 rounded-md`}>STEP {step}</span>
                    <i className={`${icon} mr-2 text-slate-500`}></i>
                    {title}
                </h2>
            );

            // カレンダー
            const Calendar = () => {
                const endDate = new Date(year, month, 0);
                const daysInMonth = endDate.getDate();
                const firstDay = new Date(year, month - 1, 1).getDay();
                
                const cells = [];
                for (let i = 0; i < firstDay; i++) {
                    cells.push(<div key={`empty-${i}`} className="h-20 bg-slate-50 border border-slate-100"></div>);
                }
                
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dayOfWeek = new Date(year, month - 1, d).getDay();
                    
                    const isExtra = extraWorkDays.includes(dateStr);
                    const absentRec = absentRecords.find(r => r.date === dateStr);
                    const isHoliday = holidays.includes(dayOfWeek);
                    const isNationalHoliday = !!JAPANESE_HOLIDAYS[dateStr];

                    let statusLabel = "";
                    let bgColor = "bg-white";
                    let textColor = "text-slate-700";
                    let borderColor = "border-slate-200";

                    if (isExtra) {
                        if(isNationalHoliday || isHoliday) {
                            statusLabel = dayOfWeek === weekdayHoliday ? "振替出勤" : "休日出勤";
                            bgColor = "bg-orange-50"; textColor = "text-orange-700"; borderColor = "border-orange-200";
                        }
                    } else if (absentRec) {
                        statusLabel = absentRec.type;
                        if(absentRec.type === '有給') {
                            bgColor = "bg-emerald-50"; textColor = "text-emerald-700"; borderColor = "border-emerald-200";
                        } else if(absentRec.type === '欠勤') {
                            bgColor = "bg-red-50"; textColor = "text-red-700"; borderColor = "border-red-200";
                        } else if(absentRec.type === '祝日') {
                            bgColor = "bg-pink-50"; textColor = "text-pink-700"; borderColor = "border-pink-200";
                        } else {
                            bgColor = "bg-blue-50"; textColor = "text-blue-700"; borderColor = "border-blue-200";
                        }
                    } else if (isNationalHoliday) {
                        statusLabel = "祝日";
                        bgColor = "bg-pink-50"; textColor = "text-pink-700"; borderColor = "border-pink-200";
                    } else if (isHoliday) {
                        statusLabel = "定休日";
                        bgColor = "bg-slate-100"; textColor = "text-slate-400";
                    }

                    cells.push(
                        <div 
                            key={d} 
                            onClick={() => toggleDateStatus(dateStr)}
                            className={`h-20 border ${borderColor} ${bgColor} p-1 cursor-pointer transition hover:brightness-95 relative group overflow-hidden`}
                        >
                            <div className="flex justify-between items-start">
                                <span className={`text-sm font-bold ${dayOfWeek === 0 ? 'text-red-500' : dayOfWeek === 6 ? 'text-blue-500' : 'text-slate-600'}`}>{d}</span>
                                {statusLabel && (
                                    <span className={`text-[9px] font-bold px-1 rounded ${textColor} bg-white/50`}>
                                        {statusLabel.slice(0,4)}
                                    </span>
                                )}
                            </div>
                            <div className="absolute bottom-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i className="fa-solid fa-pen text-slate-400 bg-white rounded-full p-1 shadow-sm text-xs"></i>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="border border-slate-200 rounded-lg overflow-hidden mb-6">
                        <div className="grid grid-cols-7 bg-slate-100 border-b border-slate-200">
                            {['日','月','火','水','木','金','土'].map((w, i) => (
                                <div key={i} className={`text-center py-2 text-xs font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-600'}`}>
                                    {w}
                                </div>
                            ))}
                        </div>
                        <div className="grid grid-cols-7">
                            {cells}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-brand-500 text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-md">
                                    <i className="fa-solid fa-tooth text-xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold text-slate-800 leading-tight">勤怠管理アプリ <span className="text-brand-500 text-xs bg-brand-50 px-1 rounded border border-brand-200 ml-1">Ver 4.0</span></h1>
                                    <p className="text-xs text-slate-500">スター歯科クリニック 西宮北口駅前院</p>
                                </div>
                            </div>
                            <div className="text-right hidden sm:block">
                                <p className="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded"><i className="fa-solid fa-save mr-1"></i>Settings Auto-Saved</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto p-4 space-y-6 mt-4">

                        {/* ステップ1：基本情報 */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 transition hover:shadow-md">
                            <SectionHeader icon="fa-solid fa-user-gear" title="基本情報設定" step="1" colorClass="bg-brand-500" />
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">対象年</label>
                                        <input type="number" value={year} onChange={(e) => setYear(Number(e.target.value))} 
                                            className="w-full rounded-lg border-slate-300 focus:border-brand-500 focus:ring-brand-500 shadow-sm p-2.5 bg-slate-50 border font-bold text-center" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">対象月</label>
                                        <input type="number" value={month} onChange={(e) => setMonth(Number(e.target.value))} 
                                            className="w-full rounded-lg border-slate-300 focus:border-brand-500 focus:ring-brand-500 shadow-sm p-2.5 bg-slate-50 border font-bold text-center" />
                                    </div>
                                </div>
                                <div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-1">従業員ID</label>
                                            <input type="text" value={empId} onChange={(e) => setEmpId(e.target.value)} 
                                                className="w-full rounded-lg border-slate-300 focus:border-brand-500 focus:ring-brand-500 shadow-sm p-2.5 border" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 mb-1">氏名</label>
                                            <input type="text" value={empName} onChange={(e) => setEmpName(e.target.value)} 
                                                className="w-full rounded-lg border-slate-300 focus:border-brand-500 focus:ring-brand-500 shadow-sm p-2.5 border" />
                                        </div>
                                    </div>

                                    {/* ドクターリストメモ */}
                                    <div className="mt-3">
                                        <details className="bg-slate-50 rounded-lg border border-slate-200 text-sm group">
                                            <summary className="px-3 py-2 text-xs font-bold text-slate-500 cursor-pointer hover:bg-slate-100 transition list-none flex justify-between items-center select-none">
                                                <span><i className="fa-solid fa-list-ul mr-2 text-brand-500"></i>ドクターID参照リスト（クリックで自動入力）</span>
                                                <i className="fa-solid fa-chevron-down text-slate-400 group-open:rotate-180 transition-transform"></i>
                                            </summary>
                                            <div className="p-3 pt-0 grid grid-cols-2 sm:grid-cols-3 gap-2 mt-2">
                                                {doctorList.map(doc => (
                                                    <button 
                                                        key={doc.id}
                                                        onClick={() => selectDoctor(doc)}
                                                        className="text-xs text-left px-2 py-1.5 rounded border border-slate-200 bg-white hover:bg-brand-50 hover:border-brand-200 hover:text-brand-600 transition flex justify-between items-center group/btn shadow-sm"
                                                    >
                                                        <span className="font-mono text-slate-400 group-hover/btn:text-brand-400">{doc.id}</span>
                                                        <span className="font-bold">{doc.name}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </details>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                                <div className="flex justify-between items-end mb-3">
                                    <label className="block text-xs font-bold text-slate-500">定休日設定 (日曜日 + 任意の曜日)</label>
                                    <span className="text-[10px] text-slate-400 bg-white px-2 py-0.5 rounded border border-slate-200">※変更は自動保存されます</span>
                                </div>
                                
                                {/* 定休日選択UI (日曜固定 + 1つ選択) */}
                                <div className="flex gap-2 flex-wrap mb-4">
                                    <button className="w-10 h-10 rounded-full text-sm font-bold bg-slate-700 text-white shadow-lg cursor-not-allowed opacity-80" disabled>日</button>
                                    
                                    {['月','火','水','木','金','土'].map((day, idx) => {
                                        const dayIdx = idx + 1; // 1(Mon) - 6(Sat)
                                        return (
                                            <button 
                                                key={dayIdx}
                                                onClick={() => setWeekdayHoliday(dayIdx)}
                                                className={`w-10 h-10 rounded-full text-sm font-bold transition-all duration-200 
                                                    ${weekdayHoliday === dayIdx
                                                        ? 'bg-brand-600 text-white shadow-lg scale-105' 
                                                        : 'bg-white text-slate-400 border border-slate-200 hover:border-slate-400'}`}
                                            >
                                                {day}
                                            </button>
                                        );
                                    })}
                                </div>
                                <p className="text-xs text-slate-400 mt-2">※選択した曜日に、祝日週の振替診療が自動設定されます。</p>
                            </div>

                            {/* 祝日データ確認アコーディオン */}
                            <div className="mt-4">
                                <details className="bg-white rounded border border-slate-200 text-sm group">
                                    <summary className="px-3 py-2 text-xs text-slate-500 cursor-pointer hover:bg-slate-50 transition list-none flex justify-between items-center select-none">
                                        <span><i className="fa-regular fa-calendar-days mr-2"></i>{year}年の祝日データ確認</span>
                                        <i className="fa-solid fa-chevron-down text-slate-300 group-open:rotate-180 transition-transform"></i>
                                    </summary>
                                    <div className="p-3 border-t border-slate-100 grid grid-cols-2 md:grid-cols-4 gap-2 bg-slate-50 max-h-40 overflow-y-auto">
                                        {allHolidaysList.map(h => (
                                            <div key={h.date} className="text-xs flex items-center gap-1">
                                                <span className="text-slate-400">{h.date.slice(5)}</span>
                                                <span className="font-bold text-slate-600">{h.name}</span>
                                            </div>
                                        ))}
                                    </div>
                                </details>
                            </div>
                        </div>

                        {/* ステップ2以降はVer3.7と同様 */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 transition hover:shadow-md">
                            <SectionHeader icon="fa-solid fa-calendar-check" title="例外スケジュールの修正" step="2" colorClass="bg-emerald-500" />
                            <p className="text-xs text-slate-500 mb-4 bg-slate-50 p-2 rounded">
                                <i className="fa-solid fa-wand-magic-sparkles mr-1 text-brand-500"></i>
                                カレンダーをクリックすると「出勤/休み」を切り替えられます。自動入力された祝日や振替出勤もここで変更できます。
                            </p>

                            {/* カレンダーエリア */}
                            <Calendar />

                            <div className="grid md:grid-cols-2 gap-8">
                                {/* 左カラム：お休み・休日出勤 */}
                                <div className="space-y-6">
                                    {/* お休み登録 */}
                                    <div>
                                        <label className="flex items-center text-sm font-bold text-slate-700 mb-2">
                                            <span className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mr-2">
                                                <i className="fa-solid fa-umbrella-beach"></i>
                                            </span>
                                            お休みリスト（祝日・有給・欠勤）
                                        </label>
                                        
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 mb-3">
                                            <div className="mb-2">
                                                <span className="text-xs text-slate-500 block mb-1">日付</span>
                                                <input type="date" value={tempAbsentDate} onChange={(e) => setTempAbsentDate(e.target.value)} 
                                                    className="w-full rounded border-slate-300 p-1.5 text-sm border outline-none" />
                                            </div>
                                            <div className="mb-3">
                                                <span className="text-xs text-slate-500 block mb-1">休みの種類</span>
                                                <div className="flex gap-2">
                                                    {['有給', '欠勤', '振替休日'].map(type => (
                                                        <label key={type} className={`flex-1 text-center py-1.5 rounded text-xs cursor-pointer border select-none transition
                                                            ${tempAbsentType === type 
                                                                ? (type === '有給' ? 'bg-emerald-500 text-white border-emerald-500' : 
                                                                   type === '欠勤' ? 'bg-red-500 text-white border-red-500' : 
                                                                   'bg-blue-500 text-white border-blue-500')
                                                                : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'}`}>
                                                            <input type="radio" name="absentType" value={type} checked={tempAbsentType === type} onChange={() => setTempAbsentType(type)} className="hidden" />
                                                            {type}
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                            <button onClick={addAbsentRecord} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-2 rounded-lg text-sm font-bold shadow-sm transition">
                                                リストに追加
                                            </button>
                                        </div>

                                        <div className="flex flex-col gap-2 min-h-[2rem]">
                                            {absentRecords.length === 0 && <span className="text-xs text-slate-300">登録なし</span>}
                                            {absentRecords.map(r => (
                                                <div key={r.date} className="flex justify-between items-center bg-white border border-slate-200 text-xs px-2 py-1.5 rounded shadow-sm">
                                                    <div className="flex items-center gap-2">
                                                        <span className="font-bold text-slate-600">{r.date.slice(5)} <span className="text-slate-400">({getWeekDay(r.date)})</span></span>
                                                        {r.type === '祝日' && <span className="text-xs text-slate-400">({r.name})</span>}
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`px-2 py-0.5 rounded-full text-[10px] text-white font-bold
                                                            ${r.type === '有給' ? 'bg-emerald-400' : r.type === '欠勤' ? 'bg-red-400' : r.type === '祝日' ? 'bg-pink-400' : 'bg-blue-400'}`}>
                                                            {r.type}
                                                        </span>
                                                        <button onClick={() => removeAbsentRecord(r.date)} className="text-slate-400 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 休日出勤 */}
                                    <div className="pt-4 border-t border-slate-100">
                                        <label className="flex items-center text-sm font-bold text-slate-700 mb-2">
                                            <span className="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center mr-2">
                                                <i className="fa-solid fa-briefcase"></i>
                                            </span>
                                            休日出勤リスト（振替診療含む）
                                        </label>
                                        <div className="flex gap-2 mb-3">
                                            <input type="date" value={tempExtraDate} onChange={(e) => setTempExtraDate(e.target.value)} 
                                                className="flex-1 rounded-lg border-slate-300 p-2 text-sm border focus:ring-2 focus:ring-orange-200 outline-none" />
                                            <button onClick={addExtraWork} className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition">
                                                追加
                                            </button>
                                        </div>
                                        <div className="flex flex-col gap-2">
                                            {extraWorkDays.length === 0 && <span className="text-xs text-slate-300">登録なし</span>}
                                            {extraWorkDays.map(d => (
                                                <div key={d} className="flex justify-between items-center bg-white border border-orange-200 text-xs px-2 py-1.5 rounded shadow-sm">
                                                     <span className="font-bold text-orange-800">{d.slice(5)} <span className="text-orange-500">({getWeekDay(d)})</span> <span className="text-orange-400 font-normal ml-1">(出勤)</span></span>
                                                     <button onClick={() => removeExtraWork(d)} className="text-slate-400 hover:text-red-500"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* 右カラム：時間変更 */}
                                <div className="border-t md:border-t-0 md:border-l border-slate-100 md:pl-8 pt-6 md:pt-0">
                                    <label className="flex items-center text-sm font-bold text-slate-700 mb-2">
                                        <span className="w-8 h-8 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center mr-2">
                                            <i className="fa-solid fa-clock"></i>
                                        </span>
                                        時間変更
                                        <span className="ml-2 text-xs font-normal text-slate-500">遅刻・早退・残業など</span>
                                    </label>
                                    
                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 mb-3">
                                        <div className="mb-2">
                                            <span className="text-xs text-slate-500 block mb-1">日付</span>
                                            <input type="date" value={tempChangeDate} onChange={(e) => setTempChangeDate(e.target.value)} 
                                                className="w-full rounded border-slate-300 p-1.5 text-sm border outline-none" />
                                        </div>
                                        <div className="flex items-end gap-2">
                                            <div className="flex-1">
                                                <span className="text-xs text-slate-500 block mb-1">開始</span>
                                                <input type="time" value={tempInTime} onChange={(e) => setTempInTime(e.target.value)} 
                                                    className="w-full rounded border-slate-300 p-1.5 text-sm border outline-none" />
                                            </div>
                                            <span className="text-slate-400 pb-2">~</span>
                                            <div className="flex-1">
                                                <span className="text-xs text-slate-500 block mb-1">終了</span>
                                                <input type="time" value={tempOutTime} onChange={(e) => setTempOutTime(e.target.value)} 
                                                    className="w-full rounded border-slate-300 p-1.5 text-sm border outline-none" />
                                            </div>
                                        </div>
                                        <button onClick={addChange} className="w-full mt-3 bg-purple-500 hover:bg-purple-600 text-white py-2 rounded-lg text-sm font-bold shadow-sm transition">
                                            リストに追加
                                        </button>
                                    </div>

                                    <div className="flex flex-col gap-2 max-h-40 overflow-y-auto pr-1">
                                        {timeChanges.length === 0 && <span className="text-xs text-slate-300">登録なし</span>}
                                        {timeChanges.map(c => (
                                            <div key={c.date} className="bg-white border border-purple-100 text-purple-800 text-xs p-2 rounded flex items-center justify-between shadow-sm">
                                                <div className="flex items-center gap-2">
                                                    <span className="font-bold bg-purple-100 px-1.5 rounded">{c.date.slice(5)}</span>
                                                    <span>{c.inTime} - {c.outTime}</span>
                                                </div>
                                                <button onClick={() => removeChange(c.date)} className="text-slate-400 hover:text-red-500 px-2">
                                                    <i className="fa-solid fa-trash-can"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* アクションボタン & プレビュー (共通) */}
                        <div className="flex justify-center pt-2">
                            <button 
                                onClick={generateData}
                                className="group bg-slate-800 hover:bg-slate-900 text-white w-full max-w-sm py-4 rounded-xl font-bold text-lg shadow-xl shadow-slate-200 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3"
                            >
                                <span className="bg-white/20 w-8 h-8 rounded-full flex items-center justify-center group-hover:bg-white/30 transition">
                                    <i className="fa-solid fa-wand-magic-sparkles"></i>
                                </span>
                                データを作成・プレビュー
                            </button>
                        </div>

                        {showPreview && (
                            <div className="mt-8 bg-white p-6 rounded-xl shadow-lg border border-brand-100 animation-fade-in">
                                <h3 className="font-bold text-slate-700 mb-4 flex justify-between items-center border-b pb-3">
                                    <span className="flex items-center gap-2">
                                        <i className="fa-solid fa-table-list text-brand-500"></i>
                                        作成結果プレビュー
                                    </span>
                                </h3>

                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                                    <div className="bg-brand-50 border border-brand-100 rounded-lg p-3 text-center">
                                        <div className="text-xs text-brand-500 font-bold mb-1">出勤日数</div>
                                        <div className="text-2xl font-bold text-brand-700">{summary.workDays}<span className="text-sm ml-1">日</span></div>
                                    </div>
                                    <div className="bg-orange-50 border border-orange-100 rounded-lg p-3 text-center">
                                        <div className="text-xs text-orange-500 font-bold mb-1">休日出勤</div>
                                        <div className="text-2xl font-bold text-orange-700">{summary.extraDays}<span className="text-sm ml-1">日</span></div>
                                    </div>
                                    <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 col-span-2">
                                        <div className="flex justify-between items-end mb-2 border-b border-slate-200 pb-1">
                                            <div className="text-xs text-slate-500 font-bold">お休み合計</div>
                                            <div className="text-xl font-bold text-slate-700">{summary.absentTotal}<span className="text-sm ml-1">日</span></div>
                                        </div>
                                        <div className="flex justify-between gap-2 text-xs">
                                            <div className="text-center flex-1 bg-white rounded border border-emerald-100 p-1">
                                                <div className="text-emerald-500 font-bold">有給</div>
                                                <div>{summary.absentPaid}日</div>
                                            </div>
                                            <div className="text-center flex-1 bg-white rounded border border-blue-100 p-1">
                                                <div className="text-blue-500 font-bold">振替</div>
                                                <div>{summary.absentSub}日</div>
                                            </div>
                                            <div className="text-center flex-1 bg-white rounded border border-red-100 p-1">
                                                <div className="text-red-500 font-bold">欠勤</div>
                                                <div>{summary.absentUnpaid}日</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="overflow-hidden border border-slate-200 rounded-lg mb-6">
                                    <div className="overflow-x-auto max-h-80 overflow-y-auto">
                                        <table className="min-w-full divide-y divide-slate-200 text-sm">
                                            <thead className="bg-slate-50 sticky top-0 z-10">
                                                <tr>
                                                    <th className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">日付</th>
                                                    <th className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">曜日</th>
                                                    <th className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">区分</th>
                                                    <th className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">出勤</th>
                                                    <th className="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">退勤</th>
                                                </tr>
                                            </thead>
                                            <tbody className="bg-white divide-y divide-slate-100">
                                                {previewData.map((row, idx) => (
                                                    <tr key={idx} className={`hover:bg-slate-50 transition ${row.type !== "通常" ? "bg-yellow-50/50" : ""}`}>
                                                        <td className="px-4 py-2.5 whitespace-nowrap text-slate-600">{row.date}</td>
                                                        <td className={`px-4 py-2.5 whitespace-nowrap font-bold 
                                                            ${row.weekIdx === 0 ? 'text-red-500' : row.weekIdx === 6 ? 'text-blue-500' : 'text-slate-600'}`}>
                                                            {row.week}
                                                        </td>
                                                        <td className="px-4 py-2.5 whitespace-nowrap">
                                                            <span className={`text-xs px-2 py-0.5 rounded-full border ${
                                                                row.type === '通常' ? 'border-slate-200 text-slate-500' : 
                                                                row.isSubstitute ? 'border-brand-500 bg-brand-50 text-brand-600 font-bold' :
                                                                row.type === '有給' ? 'border-emerald-200 bg-emerald-50 text-emerald-600' :
                                                                row.type === '欠勤' ? 'border-red-200 bg-red-50 text-red-600' :
                                                                row.type === '振替休日' ? 'border-blue-200 bg-blue-50 text-blue-600' :
                                                                row.type.includes('祝日') ? 'border-red-200 bg-red-50 text-red-600' :
                                                                row.type === '時間変更' ? 'border-purple-200 bg-purple-50 text-purple-600' :
                                                                'border-orange-200 bg-orange-50 text-orange-600'
                                                            }`}>
                                                                {row.type}
                                                            </span>
                                                        </td>
                                                        <td className="px-4 py-2.5 whitespace-nowrap font-mono text-slate-700">{row.in}</td>
                                                        <td className="px-4 py-2.5 whitespace-nowrap font-mono text-slate-700">{row.out}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div className="bg-brand-50 p-5 rounded-xl text-center border border-brand-100">
                                    <p className="text-sm text-brand-800 mb-4 font-bold">内容を確認して問題なければダウンロードしてください</p>
                                    <button 
                                        onClick={downloadCsv}
                                        className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow-md hover:shadow-lg transition duration-200 flex items-center justify-center gap-2 mx-auto"
                                    >
                                        <i className="fa-solid fa-file-csv"></i>
                                        CSVファイルを保存する
                                    </button>
                                    <p className="text-xs text-brand-400 mt-3 font-mono">
                                        ファイル名: {year}{String(month).padStart(2,'0')}_{empId}_{empName}.csv
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="text-center p-6 text-slate-400 text-xs">
                        &copy; 2026 Star Dental Clinic System.
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .animation-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* スクロールバー */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</body>
</html>
